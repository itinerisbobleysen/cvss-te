name: Update Vulnerability Info

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-vulnerabilities
  cancel-in-progress: false

jobs:
  update-vulnerability-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Set up Git configuration
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'

      - name: Run NVD Processing Script
        env:
          VULNCHECK_API_KEY: ${{ secrets.VULNCHECK_API_KEY }}
        run: python code/process_nvd.py

      - name: Cleanup temporary NVD files
        run: |
          echo "🧹 Cleaning up temporary NVD JSON files..."
          rm -f nvdcve-2.0-*.json
          rm -f *.json.gz
          echo "✅ Cleanup complete"

      - name: Check file sizes
        run: |
          echo "📊 Checking output file sizes..."
          if [ -f cvss-te.csv ]; then
            CSV_SIZE=$(du -h cvss-te.csv | cut -f1)
            CSV_SIZE_MB=$(du -m cvss-te.csv | cut -f1)
            echo "cvss-te.csv: $CSV_SIZE (${CSV_SIZE_MB}MB)"

            if [ $CSV_SIZE_MB -gt 90 ]; then
              echo "⚠️  WARNING: File is close to GitHub's 100MB limit!"
            elif [ $CSV_SIZE_MB -gt 50 ]; then
              echo "⚠️  File exceeds GitHub's 50MB recommendation"
            fi
          fi

      - name: Commit and push if there are changes
        run: |
          set -e
          TAG="v$(date +%Y%m%d%H%M%S)"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

          git add cvss-te.csv || true
          git add data/ || true
          git add code/last_run.txt || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Updated CVSS-TE data $(date +%Y-%m-%d)"
          git push origin HEAD:main

          git tag -a "$TAG" -m "Updated CVSS-TE data $(date +%Y-%m-%d)"
          git push origin "$TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          draft: false
          prerelease: false
