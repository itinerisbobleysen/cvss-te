name: Update Vulnerability Info

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Reduce noisy Node deprecation logs from transitive action deps (e.g., punycode)
env:
  NODE_OPTIONS: --no-deprecation

concurrency:
  group: update-vulnerabilities-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-vulnerabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        # v5 uses modern runtime and avoids legacy Node runtime warnings
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f code/requirements.txt ]; then
            pip install -r code/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run vulnerability updater
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -f code/update_vulnerabilities.py ]; then
            python code/update_vulnerabilities.py
          elif [ -f update_vulnerabilities.py ]; then
            python update_vulnerabilities.py
          else
            echo "Could not find update_vulnerabilities.py in expected locations."
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add common output locations (ignore missing paths)
          git add -A code/data data code/output output . || true
          git add code/last_run.txt last_run.txt || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update vulnerability data [skip ci]"
          git push
